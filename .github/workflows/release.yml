name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publish Extension and Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Install vsce and ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/animoria-vscode/package.json').version")
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Package extension
        working-directory: packages/animoria-vscode
        run: vsce package --no-dependencies -o animoria-${{ steps.version.outputs.VERSION }}.vsix

      - name: Publish to VS Code Marketplace
        working-directory: packages/animoria-vscode
        run: vsce publish --no-dependencies --packagePath animoria-${{ steps.version.outputs.VERSION }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        working-directory: packages/animoria-vscode
        run: ovsx publish animoria-${{ steps.version.outputs.VERSION }}.vsix -p ${{ secrets.OVSX_PAT }}

      - name: Build JetBrains Plugin
        run: |
          mkdir -p packages/animoria-jetbrains/src/main/resources/assets
          cp -r apps/animoria-sandbox/dist/* packages/animoria-jetbrains/src/main/resources/assets/
          cd packages/animoria-jetbrains
          chmod +x ./gradlew
          ./gradlew buildPlugin

      - name: Publish to JetBrains Marketplace
        continue-on-error: true

        env:
          JETBRAINS_PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}
        run: |
          cd packages/animoria-jetbrains
          ./gradlew publishPlugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/animoria-vscode/animoria-${{ steps.version.outputs.VERSION }}.vsix
            packages/animoria-jetbrains/build/distributions/*.zip
          generate_release_notes: true
          body: |
            ## Animoria v${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/sxnnyside-project/animoria/blob/main/packages/animoria-vscode/CHANGELOG.md) for details.

            ### Install
            Search **Animoria** in the VS Code Extensions panel,
            or download the `.vsix`/`.zip` from this release and install manually:

            ```
            code --install-extension animoria-${{ steps.version.outputs.VERSION }}.vsix
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
